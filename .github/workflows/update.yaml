name: bumpkin

on:
  workflow_dispatch:
    inputs:
      package_set_repository:
        description: "owner/repo of the flake package set to update"
        required: true
      package:
        description: "package attribute to update"
        required: false
      maintainer:
        description: "maintainer to inspect with dry-run"
        required: false
      commit:
        description: "create a signed commit when package is set"
        required: false
        default: "false"

jobs:
  bumpkin:
    runs-on: ubuntu-latest
    steps:
      - uses: cachix/install-nix-action@v31

      - name: Checkout bumpkin
        uses: actions/checkout@v4
        with:
          path: bumpkin

      - name: Checkout package set
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.package_set_repository }}
          path: package-set
          token: ${{ secrets.GH_TOKEN || github.token }}

      - name: Build bumpkin
        working-directory: bumpkin
        run: nix build

      - name: Configure signed commits
        if: inputs.commit == 'true' && secrets.BUMPKIN_SIGNING_KEY != ''
        env:
          BUMPKIN_SIGNING_KEY: ${{ secrets.BUMPKIN_SIGNING_KEY }}
          BUMPKIN_SIGNING_KEY_PUB: ${{ secrets.BUMPKIN_SIGNING_KEY_PUB }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$BUMPKIN_SIGNING_KEY" > ~/.ssh/bumpkin_signing_key
          printf '%s\n' "$BUMPKIN_SIGNING_KEY_PUB" > ~/.ssh/bumpkin_signing_key.pub
          chmod 600 ~/.ssh/bumpkin_signing_key
          git config --global gpg.format ssh
          git config --global user.signingkey ~/.ssh/bumpkin_signing_key.pub
          git config --global commit.gpgsign true

      - name: Dry-run maintainer packages
        if: inputs.maintainer != ''
        run: ./bumpkin/result/bin/bumpkin dry-run --root package-set --maintainer '${{ inputs.maintainer }}'

      - name: Update package
        if: inputs.package != ''
        run: |
          args=(--root package-set --package '${{ inputs.package }}')
          if [ '${{ inputs.commit }}' = 'true' ]; then
            args+=(--commit --signed)
          fi
          ./bumpkin/result/bin/bumpkin update "${args[@]}"

      - name: Show result
        working-directory: package-set
        run: git status --short && git diff --stat
